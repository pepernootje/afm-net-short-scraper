name: Daily AFM short positions scrape

on:
  schedule:
    - cron: "30 17 * * 1-5"   # 17:30 UTC = 18:30 Amsterdam (CET)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      - run: uv python install 3.12
      - run: uv sync
      - run: uv run python -m scraper.main
      - name: Commit updated data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add short_positions.db data/
          git diff --cached --quiet || git commit -m "chore: daily AFM scrape $(date -u +%Y-%m-%d)"
          git push
